<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BotControl - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              surface: "#f8f9ff",
              background: "#f8f9ff",
              primary: "#00355f",
              "primary-container": "#0f4c81"
            },
            fontFamily: {
              h1: ["Manrope"],
              "body-base": ["Inter"]
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
      }
    </style>
  </head>
  <body class="bg-background font-body-base text-slate-900 antialiased">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-md">
        <div class="flex items-center gap-3 justify-center mb-8">
          <div class="w-10 h-10 bg-primary rounded flex items-center justify-center text-white">
            <span class="material-symbols-outlined">smart_toy</span>
          </div>
          <div>
            <div class="text-xl font-black font-h1 tracking-tight">BotControl</div>
            <div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Centro de control</div>
          </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
          <h1 class="text-lg font-bold font-h1 mb-1">Ingreso de asesor</h1>
          <p class="text-sm text-slate-500 mb-6">Accede a la bandeja de conversaciones.</p>

          <div class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-slate-600 mb-1">Email</label>
              <input
                id="email"
                type="email"
                autocomplete="username"
                class="w-full bg-slate-50 border-slate-200 rounded-lg py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-700/20 focus:border-blue-700"
              />
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-600 mb-1">Contraseña</label>
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                class="w-full bg-slate-50 border-slate-200 rounded-lg py-2.5 px-3 text-sm focus:ring-2 focus:ring-blue-700/20 focus:border-blue-700"
              />
            </div>

            <button
              id="loginBtn"
              class="w-full bg-blue-700 text-white py-2.5 rounded-lg text-sm font-bold hover:bg-blue-800 active:opacity-80 transition"
            >
              Entrar
            </button>

            <div id="err" class="text-sm text-red-600 hidden"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const errEl = document.getElementById("err");
      const btn = document.getElementById("loginBtn");

      async function login() {
        errEl.classList.add("hidden");
        btn.disabled = true;
        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailEl.value.trim(), password: passwordEl.value })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data?.error || "login_failed");
          localStorage.setItem("token", data.token);
          location.href = "/agent.html";
        } catch (e) {
          errEl.textContent = e?.message || String(e);
          errEl.classList.remove("hidden");
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", login);
      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") login();
      });
    </script>
  </body>
</html>
